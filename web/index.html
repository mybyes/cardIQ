<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CardIQ — optimise earning &amp; burning of points</title>
    <!-- Split deploy (static front-end + API on Railway): paste your Railway URL here.
         Leave empty when one server hosts both (Railway full-stack) or for local dev. -->
    <meta name="cardiq-api" content="" />
    <script>if (!localStorage.getItem("cardiq-session")) { try { sessionStorage.setItem("cardiq-after", location.pathname + location.hash); } catch (e) {} location.replace("/web/login.html"); }</script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --font-display: "Fraunces", Georgia, "Times New Roman", serif;
        --bg: #ece4d4; --panel: #fbf8f1; --panel2: #f3ecdd; --line: #ddd1ba;
        --text: #1a160d; --muted: #736a57;
        --accent: #a8822e; --accent-weak: #f0e6cb; --accent-ink: #1a160d;
        --good: #2f6b4f; --good-weak: #e4ecdd;
        --warn: #9a6a16; --bad: #9c4128; --bad-weak: #f1e1d6; --star: #a8822e;
        --topbar-bg: rgba(236,228,212,.85);
        --shadow: 0 1px 2px rgba(60,45,20,.05), 0 2px 8px rgba(60,45,20,.06);
        --shadow-lg: 0 12px 34px rgba(50,38,16,.16);
        --radius: 16px;
      }
      :root[data-theme="dark"] {
        --bg: #14110b; --panel: #1d1910; --panel2: #262013; --line: #372f1d;
        --text: #ede3cd; --muted: #9c9079;
        --accent: #c6a456; --accent-weak: #2a2314; --accent-ink: #14110b;
        --good: #6fc294; --good-weak: #17311f;
        --warn: #cf9a3c; --bad: #d98a6f; --bad-weak: #311c14; --star: #c6a456;
        --topbar-bg: rgba(20,17,11,.85);
        --shadow: 0 1px 2px rgba(0,0,0,.3), 0 2px 8px rgba(0,0,0,.25);
        --shadow-lg: 0 12px 34px rgba(0,0,0,.5);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--text);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 15px; line-height: 1.55; -webkit-font-smoothing: antialiased;
      }
      .num, .total, .val, td.num { font-variant-numeric: tabular-nums; }

      /* ---- sticky top bar (brand + controls + nav) ---- */
      .topbar { position: sticky; top: 0; z-index: 20; background: var(--topbar-bg); backdrop-filter: saturate(1.4) blur(10px); border-bottom: 1px solid var(--line); }
      .iconbtn { background: var(--panel2); border: 1px solid var(--line); border-radius: 9px; padding: 6px 11px; cursor: pointer; font-size: 14px; color: var(--text); }
      .iconbtn:hover { border-color: var(--accent); }
      header { max-width: 1040px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
      header h1 { font-family: var(--font-display); font-size: 22px; font-weight: 600; margin: 0; letter-spacing: -.01em; white-space: nowrap; }
      .brand-iq { color: var(--accent); }
      header .sub { color: var(--muted); font-size: 12.5px; }
      header .spacer { margin-left: auto; }

      nav.nav { max-width: 1040px; margin: 0 auto; padding: 0 12px; }
      .tabs { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; }
      .tabs::-webkit-scrollbar { display: none; }
      .tab { padding: 11px 14px; cursor: pointer; color: var(--muted); font-size: 14px; font-weight: 500; white-space: nowrap; border-bottom: 2px solid transparent; transition: color .15s; }
      .tab:hover { color: var(--text); }
      .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

      .wrap { max-width: 1040px; margin: 0 auto; padding: 26px 20px 64px; }
      .subnav { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
      .subnav:empty { display: none; }
      .subnav .sub { background: var(--panel); border: 1px solid var(--line); color: var(--muted); border-radius: 999px; padding: 7px 16px; font-size: 13.5px; font-weight: 500; cursor: pointer; box-shadow: var(--shadow); transition: all .15s; }
      .subnav .sub:hover { color: var(--text); }
      .subnav .sub.on { background: var(--accent-weak); color: var(--accent); border-color: var(--accent); font-weight: 600; }

      /* ---- panels & sections ---- */
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 22px; margin-bottom: 16px; box-shadow: var(--shadow); }
      h2 { font-family: var(--font-display); font-size: 18px; font-weight: 500; margin: 0 0 14px; color: var(--text); letter-spacing: -.01em; }
      h2 .meta { font-weight: 400; }

      /* ---- form controls ---- */
      label { display: block; font-size: 12px; color: var(--muted); margin: 0 0 5px; font-weight: 500; }
      input, select, textarea { width: 100%; background: var(--panel2); border: 1px solid var(--line); color: var(--text); border-radius: 10px; padding: 10px 12px; font: inherit; transition: border-color .15s, box-shadow .15s; }
      input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-weak); }
      .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 12px; }
      .chk { display: flex; gap: 18px; align-items: center; margin: 6px 0 14px; flex-wrap: wrap; }
      .chk label { display: flex; align-items: center; gap: 7px; color: var(--text); margin: 0; font-size: 14px; }
      .chk input { width: auto; accent-color: var(--accent); }

      /* ---- buttons ---- */
      button.go { background: var(--text); color: var(--panel); border: 0; border-radius: 10px; padding: 11px 20px; font-weight: 600; cursor: pointer; font-size: 14.5px; box-shadow: var(--shadow); transition: filter .15s, transform .05s; }
      button.go:hover { filter: brightness(1.07); }
      button.go:active { transform: translateY(1px); }

      /* ---- cards ---- */
      .card { border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; background: var(--panel2); transition: box-shadow .15s; }
      .card.best { border-color: var(--accent); background: var(--accent-weak); box-shadow: 0 0 0 1px var(--accent) inset; }
      .card .top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
      .card .name { font-weight: 700; font-size: 16px; letter-spacing: -.01em; }
      .card .val { font-weight: 800; font-size: 18px; }
      .card .val small { font-weight: 500; color: var(--muted); font-size: 12px; }
      .badge { font-size: 10.5px; padding: 3px 9px; border-radius: 999px; background: var(--accent); color: #fff; font-weight: 700; margin-left: 8px; letter-spacing: .03em; text-transform: uppercase; vertical-align: middle; }

      /* ---- text helpers ---- */
      .bd { color: var(--muted); font-size: 13.5px; margin-top: 8px; }
      .bd div { padding: 1px 0; }
      .bd b { color: var(--text); font-weight: 600; }
      .warn { color: var(--warn); }
      .star { color: var(--star); }
      .meta { color: var(--muted); font-size: 12px; }
      .hint { color: var(--muted); font-size: 12.5px; margin-top: 6px; }
      .leak { color: var(--bad); font-weight: 600; }
      .ok { color: var(--good); }
      .total { font-family: var(--font-display); font-size: 30px; font-weight: 500; letter-spacing: -.02em; display: inline-block; margin-top: 2px; }

      /* ---- progress bar ---- */
      .bar { height: 7px; border-radius: 999px; background: var(--line); overflow: hidden; margin: 6px 0; }
      .bar > span { display: block; height: 100%; background: var(--accent); border-radius: 999px; }

      /* ---- tables ---- */
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      td, th { text-align: left; padding: 9px 8px; border-bottom: 1px solid var(--line); }
      tr:last-child td { border-bottom: 0; }
      th { color: var(--muted); font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: .03em; }
      td.num, th.num { text-align: right; }

      textarea { min-height: 96px; resize: vertical; font-family: ui-monospace, "SF Mono", monospace; font-size: 13px; }
      .disclaimer { color: var(--muted); font-size: 11.5px; margin-top: 8px; text-align: center; }
      code { background: var(--panel2); border: 1px solid var(--line); border-radius: 5px; padding: 1px 5px; font-size: 12.5px; }
      a { color: var(--accent); }

      /* ---- bento grid + stat tiles + viz ---- */
      .grid { display: grid; gap: 16px; margin-bottom: 16px; }
      .grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
      .grid-3 { grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); }
      .grid .panel { margin: 0; }
      .stat { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); transition: transform .15s, box-shadow .15s; }
      .stat:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
      .stat .l { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 7px; }
      .stat .v { font-family: var(--font-display); font-size: 32px; font-weight: 500; letter-spacing: -.02em; margin-top: 6px; }
      .chip { width: 36px; height: 36px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 12.5px; letter-spacing: .02em; flex: none; box-shadow: inset 0 1px 0 rgba(255,255,255,.25), 0 1px 2px rgba(0,0,0,.15); }
      .hbar { display: grid; grid-template-columns: 96px 1fr auto; align-items: center; gap: 12px; padding: 7px 0; font-size: 13.5px; }
      .hbar .track { background: var(--panel2); border-radius: 6px; height: 10px; overflow: hidden; }
      .hbar .track > span { display: block; height: 100%; background: var(--accent); border-radius: 6px; }
      .card { transition: transform .15s, box-shadow .15s; }
      .card:hover { transform: translateY(-1px); box-shadow: var(--shadow); }

      /* ---- drag & drop card picker ---- */
      .dz-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      @media (max-width: 640px) { .dz-wrap { grid-template-columns: 1fr; } }
      .dz { background: var(--panel2); border: 1.5px dashed var(--line); border-radius: 14px; padding: 14px; min-height: 130px; transition: border-color .15s, background .15s; }
      .dz.over { border-color: var(--accent); background: var(--accent-weak); }
      .dz h3 { font-size: 12px; color: var(--muted); margin: 0 0 12px; text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
      .card-tile { display: flex; align-items: center; gap: 11px; background: var(--panel); border: 1px solid var(--line); border-radius: 11px; padding: 10px 12px; margin-bottom: 8px; cursor: grab; box-shadow: var(--shadow); transition: transform .1s, box-shadow .15s; user-select: none; }
      .card-tile:hover { box-shadow: var(--shadow-lg); border-color: var(--accent); }
      .card-tile:active { cursor: grabbing; }
      .card-tile.dragging { opacity: .45; }
      .card-tile .t-name { font-weight: 600; font-size: 14.5px; }
      .card-tile .t-meta { color: var(--muted); font-size: 12px; }
      .card-tile .t-move { margin-left: auto; color: var(--muted); font-size: 17px; font-weight: 600; }
      .apply { margin-left: auto; background: var(--accent); color: var(--accent-ink); border-radius: 8px; padding: 5px 12px; font-size: 12.5px; font-weight: 600; text-decoration: none; white-space: nowrap; }
      .apply:hover { filter: brightness(1.08); }

      /* ---- rendered credit-card faces (signature element) ---- */
      .cardgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); gap: 16px; }
      .cardface { position: relative; aspect-ratio: 1.586 / 1; border-radius: 15px; padding: 16px 18px; color: #fff; box-shadow: var(--shadow-lg); overflow: hidden; display: flex; flex-direction: column; isolation: isolate; transition: transform .14s ease-out, box-shadow .2s; will-change: transform; }
      .cardface .cf-shine { position: absolute; inset: 0; z-index: 2; pointer-events: none; opacity: 0; transition: opacity .2s; background: radial-gradient(220px 220px at var(--mx,50%) var(--my,0%), rgba(255,255,255,.28), transparent 60%); }
      .cardface:hover .cf-shine { opacity: 1; }
      .cardface::before { content: ""; position: absolute; inset: 0; background: radial-gradient(130% 120% at 0% 0%, rgba(255,255,255,.22), transparent 55%); z-index: -1; }
      .cardface::after { content: ""; position: absolute; right: -38px; bottom: -52px; width: 170px; height: 170px; border-radius: 50%; background: rgba(255,255,255,.06); }
      .cf-row { display: flex; justify-content: space-between; align-items: center; font-size: 11.5px; letter-spacing: .08em; text-transform: uppercase; font-weight: 700; opacity: .95; }
      .cf-chip { width: 38px; height: 28px; border-radius: 5px; margin: 16px 0 auto; background: linear-gradient(135deg, #f4dd92, #c89a3a); box-shadow: inset 0 0 0 1px rgba(0,0,0,.18); position: relative; }
      .cf-chip::after { content: ""; position: absolute; inset: 5px 9px; border: 1px solid rgba(0,0,0,.22); border-radius: 2px; }
      .cf-name { font-family: var(--font-display); font-weight: 600; font-size: 17px; letter-spacing: -.01em; }
      .cf-foot { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 4px; }
      .cf-fee { font-size: 11.5px; opacity: .85; }
      .cf-net { font-size: 12px; font-weight: 700; background: rgba(255,255,255,.18); padding: 3px 9px; border-radius: 999px; }

      /* ---- mini card faces (drag picker) ---- */
      .minicard { width: 56px; height: 36px; border-radius: 7px; flex: none; position: relative; box-shadow: var(--shadow); overflow: hidden; }
      .minicard::before { content: ""; position: absolute; inset: 0; background: radial-gradient(120% 120% at 0% 0%, rgba(255,255,255,.25), transparent 55%); }
      .minicard::after { content: ""; position: absolute; left: 7px; top: 11px; width: 12px; height: 9px; border-radius: 2px; background: linear-gradient(135deg, #f4dd92, #c89a3a); }

      /* ---- route chip (awards) ---- */
      .routechip { display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 999px; font-size: 11.5px; font-weight: 700; letter-spacing: .03em; background: var(--accent-weak); color: var(--accent); margin-right: 6px; }
      .routechip .ic { width: 12px; height: 12px; }

      /* ---- entrance motion ---- */
      @keyframes fadeUp { from { opacity: 0; transform: translateY(9px); } to { opacity: 1; transform: none; } }
      @media (prefers-reduced-motion: no-preference) {
        .panel, .stat, .cardface, .hero { animation: fadeUp .38s ease both; }
        .grid-3 .stat:nth-child(2) { animation-delay: .05s; }
        .grid-3 .stat:nth-child(3) { animation-delay: .1s; }
      }

      /* ---- inline icons ---- */
      .ic { width: 1em; height: 1em; vertical-align: -.13em; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .stat .l .ic { width: 16px; height: 16px; }

      /* ---- loyalty / airline-hotel chips ---- */
      .loychip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 999px; font-size: 12px; font-weight: 600; background: var(--panel2); border: 1px solid var(--line); margin: 3px 4px 0 0; }
      .loychip .ic { width: 13px; height: 13px; }
      .loychip.poor { opacity: .6; }

      /* ---- hero art (floating cards + flight route) ---- */
      .hero { position: relative; overflow: hidden; }
      .hero > * { position: relative; z-index: 1; }
      .hero-art { position: absolute; right: 26px; top: 0; bottom: 0; width: 300px; z-index: 0; pointer-events: none; display: none; }
      @media (min-width: 860px) { .hero-art { display: block; } }
      .hero-art .fc { position: absolute; width: 232px; aspect-ratio: 1.586/1; border-radius: 15px; box-shadow: 0 24px 50px rgba(0,0,0,.4); overflow: hidden; }
      .hero-art .fc1 { right: 8px; top: 78px; transform: rotate(-16deg); background: linear-gradient(135deg, #34291a, #17120a); }
      .hero-art .fc2 { right: 64px; top: 30px; transform: rotate(-8deg); background: linear-gradient(135deg, #dcc086, #a8822e); }
      .hero-art .fc .hchip { position: absolute; left: 18px; top: 42px; width: 32px; height: 24px; border-radius: 4px; background: linear-gradient(135deg, #f4dd92, #c89a3a); }
      .hero-art .fc2 .hchip { background: linear-gradient(135deg, #3a2f18, #6b541f); }
      .hero-art .route { position: absolute; right: 30px; top: 16px; width: 230px; height: 90px; color: rgba(201,162,75,.55); }

      /* ---- hero (Home) ---- */
      .hero { background: linear-gradient(152deg, #2b2519 0%, #14110a 100%); color: #f1ead9; border-radius: var(--radius); padding: 42px 36px; margin-bottom: 16px; box-shadow: var(--shadow-lg); }
      .hero h1 { font-family: var(--font-display); font-size: 46px; font-weight: 600; margin: 0 0 12px; letter-spacing: -.025em; line-height: 1.02; }
      .hero h1 em { font-style: italic; color: #c9a24b; }
      .hero p { margin: 0 0 22px; color: #cfc3a4; font-size: 16px; line-height: 1.6; max-width: 560px; }
      .hero .alert { background: rgba(201,162,75,.13); border: 1px solid rgba(201,162,75,.32); border-radius: 10px; padding: 11px 15px; margin-bottom: 22px; font-size: 14px; color: #e6d8b4; }
      .hero .cta { display: flex; gap: 10px; flex-wrap: wrap; }
      .hero button { border: 0; border-radius: 10px; padding: 12px 20px; font-weight: 600; font-size: 14.5px; cursor: pointer; transition: filter .15s, transform .05s; }
      .hero button:active { transform: translateY(1px); }
      .hero .primary { background: #f1ead9; color: #1a160d; }
      .hero .primary:hover { filter: brightness(.96); }
      .hero .ghost { background: rgba(255,255,255,.08); color: #f1ead9; border: 1px solid rgba(201,162,75,.3); }
      .hero .ghost:hover { background: rgba(255,255,255,.14); }
      @media (max-width: 560px) { .hero h1 { font-size: 32px; } .hero { padding: 30px 24px; } }

      @media (max-width: 620px) { header .sub { display: none; } }
    </style>
  </head>
  <body>
    <div class="topbar">
      <header>
        <h1>💳 Card<span class="brand-iq">IQ</span></h1>
        <span class="sub">optimise earning &amp; burning of points · cards, loyalty &amp; websites · India</span>
        <span class="spacer"></span>
        <span id="profilebar" style="display:flex; gap:6px; align-items:center"></span>
        <label style="margin:0; display:flex; align-items:center; gap:6px; font-size:12px">
          point value
          <select id="mode" style="width:auto" title="How to value your reward points">
            <option value="best">Optimistic</option>
            <option value="typical" selected>Realistic</option>
            <option value="floor">Conservative</option>
          </select>
        </label>
        <button id="theme-toggle" class="iconbtn" title="Toggle light / dark">🌙</button>
        <button id="nav-cards" class="iconbtn" title="Manage your cards">⚙</button>
      </header>
      <nav class="nav">
        <div class="tabs">
          <div class="tab active" data-tab="home">Home</div>
          <div class="tab" data-tab="recommend">Use a card</div>
          <div class="tab" data-tab="wallet">Points</div>
          <div class="tab" data-tab="coach">Review</div>
          <div class="tab" data-tab="getcard">＋ Get a card</div>
        </div>
      </nav>
    </div>
    <div class="wrap">
      <div class="subnav" id="subnav"></div>
      <div id="home"></div>
      <div id="recommend" hidden></div>
      <div id="plan" hidden></div>
      <div id="wallet" hidden></div>
      <div id="redeem" hidden></div>
      <div id="coach" hidden></div>
      <div id="getcard" hidden></div>
      <div id="cards" hidden></div>
      <p class="disclaimer">Card terms change often — confirm current details with your issuer before deciding.</p>
    </div>
    <script type="module" src="/web/app.js"></script>
  </body>
</html>
