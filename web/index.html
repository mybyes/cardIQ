<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CC Advisor — optimise earning &amp; burning of points</title>
    <style>
      :root {
        --bg: #0e1116; --panel: #171c24; --panel2: #1f2630; --line: #2a323d;
        --text: #e6edf3; --muted: #8b97a7; --accent: #4cc2ff; --good: #3fb950;
        --warn: #d29922; --bad: #f85149; --star: #e3b341;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text); font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      header { padding: 18px 20px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
      header h1 { font-size: 18px; margin: 0; }
      header .sub { color: var(--muted); font-size: 13px; }
      .wrap { max-width: 880px; margin: 0 auto; padding: 20px; }
      .tabs { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
      .tab { padding: 8px 16px; border-radius: 999px; background: var(--panel); border: 1px solid var(--line); cursor: pointer; color: var(--muted); }
      .tab.active { background: var(--accent); color: #042438; border-color: var(--accent); font-weight: 600; }
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
      h2 { font-size: 15px; margin: 0 0 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
      label { display: block; font-size: 12px; color: var(--muted); margin: 0 0 4px; }
      input, select, textarea { width: 100%; background: var(--panel2); border: 1px solid var(--line); color: var(--text); border-radius: 9px; padding: 9px 11px; font: inherit; }
      .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 12px; }
      .chk { display: flex; gap: 16px; align-items: center; margin: 4px 0 14px; flex-wrap: wrap; }
      .chk label { display: flex; align-items: center; gap: 6px; color: var(--text); margin: 0; }
      .chk input { width: auto; }
      button.go { background: var(--accent); color: #042438; border: 0; border-radius: 9px; padding: 11px 22px; font-weight: 700; cursor: pointer; font-size: 15px; }
      .card { border: 1px solid var(--line); border-radius: 11px; padding: 13px 15px; margin-bottom: 10px; background: var(--panel2); }
      .card.best { border-color: var(--good); box-shadow: 0 0 0 1px var(--good) inset; }
      .card .top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
      .card .name { font-weight: 700; font-size: 16px; }
      .card .val { font-weight: 800; font-size: 18px; }
      .card .val small { font-weight: 500; color: var(--muted); font-size: 12px; }
      .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: var(--good); color: #042; font-weight: 700; margin-left: 8px; }
      .bd { color: var(--muted); font-size: 13px; margin-top: 8px; }
      .bd div { padding: 1px 0; }
      .warn { color: var(--warn); }
      .star { color: var(--star); }
      .bar { height: 8px; border-radius: 999px; background: var(--panel); overflow: hidden; margin: 5px 0; border: 1px solid var(--line); }
      .bar > span { display: block; height: 100%; background: var(--accent); }
      .meta { color: var(--muted); font-size: 12px; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      td, th { text-align: left; padding: 7px 6px; border-bottom: 1px solid var(--line); }
      th { color: var(--muted); font-weight: 600; font-size: 12px; }
      td.num { text-align: right; font-variant-numeric: tabular-nums; }
      .leak { color: var(--bad); font-weight: 600; }
      .ok { color: var(--good); }
      textarea { min-height: 96px; resize: vertical; font-family: ui-monospace, monospace; font-size: 13px; }
      .hint { color: var(--muted); font-size: 12px; margin-top: 6px; }
      .total { font-size: 22px; font-weight: 800; }
      .disclaimer { color: var(--muted); font-size: 11px; margin-top: 4px; }
    </style>
  </head>
  <body>
    <header>
      <h1>💳 CC Advisor</h1>
      <span class="sub">optimise earning &amp; burning of points · across cards, loyalty &amp; websites · India 2026</span>
      <span style="margin-left:auto"></span>
      <span id="profilebar" style="display:flex; gap:6px; align-items:center"></span>
      <label style="margin:0">
        valuation
        <select id="mode" style="width:auto; display:inline-block; margin-left:6px">
          <option value="best">best (optimizer)</option>
          <option value="typical" selected>typical</option>
          <option value="floor">floor (cashback)</option>
        </select>
      </label>
    </header>
    <div class="wrap">
      <div class="tabs">
        <div class="tab active" data-tab="home">Home</div>
        <div class="tab" data-tab="recommend">Recommend</div>
        <div class="tab" data-tab="plan">Plan</div>
        <div class="tab" data-tab="wallet">Wallet</div>
        <div class="tab" data-tab="redeem">Redeem</div>
        <div class="tab" data-tab="coach">Coach</div>
        <div class="tab" data-tab="getcard">＋ Get a card</div>
        <div class="tab" data-tab="cards">⚙ Cards</div>
      </div>
      <div id="home"></div>
      <div id="recommend" hidden></div>
      <div id="plan" hidden></div>
      <div id="wallet" hidden></div>
      <div id="redeem" hidden></div>
      <div id="coach" hidden></div>
      <div id="getcard" hidden></div>
      <div id="cards" hidden></div>
      <p class="disclaimer">Illustrative + researched data (June 2026). Verify against issuer T&Cs before financial decisions.</p>
    </div>
    <script type="module" src="/web/app.js"></script>
  </body>
</html>
