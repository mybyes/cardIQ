<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CardIQ — optimise earning &amp; burning of points</title>
    <!-- Split deploy (static front-end + API on Railway): paste your Railway URL here.
         Leave empty when one server hosts both (Railway full-stack) or for local dev. -->
    <meta name="cardiq-api" content="" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f4f5f8; --panel: #ffffff; --panel2: #f3f5f9; --line: #e6e8ef;
        --text: #0f1626; --muted: #697185;
        --accent: #4f46e5; --accent-weak: #eef0fe; --accent-ink: #ffffff;
        --good: #0a9d57; --good-weak: #e8f6ee;
        --warn: #9a6700; --bad: #d63649; --bad-weak: #fdecee; --star: #b8860b;
        --topbar-bg: rgba(255,255,255,.85);
        --shadow: 0 1px 2px rgba(16,24,40,.04), 0 2px 6px rgba(16,24,40,.05);
        --shadow-lg: 0 6px 24px rgba(16,24,40,.09);
        --radius: 16px;
      }
      :root[data-theme="dark"] {
        --bg: #0c0f16; --panel: #151b25; --panel2: #1c2330; --line: #2a323f;
        --text: #e8edf4; --muted: #8b95a8;
        --accent: #7c83ff; --accent-weak: #20243c; --accent-ink: #0c0f16;
        --good: #3fcf8e; --good-weak: #15301f;
        --warn: #e0a93c; --bad: #f26b73; --bad-weak: #331c20; --star: #e3b341;
        --topbar-bg: rgba(12,15,22,.82);
        --shadow: 0 1px 2px rgba(0,0,0,.3), 0 2px 8px rgba(0,0,0,.25);
        --shadow-lg: 0 8px 28px rgba(0,0,0,.45);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--text);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 15px; line-height: 1.55; -webkit-font-smoothing: antialiased;
      }
      .num, .total, .val, td.num { font-variant-numeric: tabular-nums; }

      /* ---- sticky top bar (brand + controls + nav) ---- */
      .topbar { position: sticky; top: 0; z-index: 20; background: var(--topbar-bg); backdrop-filter: saturate(1.4) blur(10px); border-bottom: 1px solid var(--line); }
      .iconbtn { background: var(--panel2); border: 1px solid var(--line); border-radius: 9px; padding: 6px 11px; cursor: pointer; font-size: 14px; color: var(--text); }
      .iconbtn:hover { border-color: var(--accent); }
      header { max-width: 1040px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
      header h1 { font-size: 19px; font-weight: 800; margin: 0; letter-spacing: -.02em; white-space: nowrap; }
      .brand-iq { color: var(--accent); }
      header .sub { color: var(--muted); font-size: 12.5px; }
      header .spacer { margin-left: auto; }

      nav.nav { max-width: 1040px; margin: 0 auto; padding: 0 12px; }
      .tabs { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; }
      .tabs::-webkit-scrollbar { display: none; }
      .tab { padding: 11px 14px; cursor: pointer; color: var(--muted); font-size: 14px; font-weight: 500; white-space: nowrap; border-bottom: 2px solid transparent; transition: color .15s; }
      .tab:hover { color: var(--text); }
      .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

      .wrap { max-width: 1040px; margin: 0 auto; padding: 26px 20px 64px; }
      .subnav { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
      .subnav:empty { display: none; }
      .subnav .sub { background: var(--panel); border: 1px solid var(--line); color: var(--muted); border-radius: 999px; padding: 7px 16px; font-size: 13.5px; font-weight: 500; cursor: pointer; box-shadow: var(--shadow); transition: all .15s; }
      .subnav .sub:hover { color: var(--text); }
      .subnav .sub.on { background: var(--accent-weak); color: var(--accent); border-color: var(--accent); font-weight: 600; }

      /* ---- panels & sections ---- */
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 22px; margin-bottom: 16px; box-shadow: var(--shadow); }
      h2 { font-size: 15px; font-weight: 650; margin: 0 0 14px; color: var(--text); letter-spacing: -.01em; }
      h2 .meta { font-weight: 400; }

      /* ---- form controls ---- */
      label { display: block; font-size: 12px; color: var(--muted); margin: 0 0 5px; font-weight: 500; }
      input, select, textarea { width: 100%; background: var(--panel2); border: 1px solid var(--line); color: var(--text); border-radius: 10px; padding: 10px 12px; font: inherit; transition: border-color .15s, box-shadow .15s; }
      input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-weak); }
      .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 12px; }
      .chk { display: flex; gap: 18px; align-items: center; margin: 6px 0 14px; flex-wrap: wrap; }
      .chk label { display: flex; align-items: center; gap: 7px; color: var(--text); margin: 0; font-size: 14px; }
      .chk input { width: auto; accent-color: var(--accent); }

      /* ---- buttons ---- */
      button.go { background: var(--accent); color: var(--accent-ink); border: 0; border-radius: 10px; padding: 11px 20px; font-weight: 600; cursor: pointer; font-size: 14.5px; box-shadow: var(--shadow); transition: filter .15s, transform .05s; }
      button.go:hover { filter: brightness(1.07); }
      button.go:active { transform: translateY(1px); }

      /* ---- cards ---- */
      .card { border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; background: var(--panel2); transition: box-shadow .15s; }
      .card.best { border-color: var(--accent); background: var(--accent-weak); box-shadow: 0 0 0 1px var(--accent) inset; }
      .card .top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
      .card .name { font-weight: 700; font-size: 16px; letter-spacing: -.01em; }
      .card .val { font-weight: 800; font-size: 18px; }
      .card .val small { font-weight: 500; color: var(--muted); font-size: 12px; }
      .badge { font-size: 10.5px; padding: 3px 9px; border-radius: 999px; background: var(--accent); color: #fff; font-weight: 700; margin-left: 8px; letter-spacing: .03em; text-transform: uppercase; vertical-align: middle; }

      /* ---- text helpers ---- */
      .bd { color: var(--muted); font-size: 13.5px; margin-top: 8px; }
      .bd div { padding: 1px 0; }
      .bd b { color: var(--text); font-weight: 600; }
      .warn { color: var(--warn); }
      .star { color: var(--star); }
      .meta { color: var(--muted); font-size: 12px; }
      .hint { color: var(--muted); font-size: 12.5px; margin-top: 6px; }
      .leak { color: var(--bad); font-weight: 600; }
      .ok { color: var(--good); }
      .total { font-size: 26px; font-weight: 800; letter-spacing: -.02em; display: inline-block; margin-top: 2px; }

      /* ---- progress bar ---- */
      .bar { height: 7px; border-radius: 999px; background: var(--line); overflow: hidden; margin: 6px 0; }
      .bar > span { display: block; height: 100%; background: var(--accent); border-radius: 999px; }

      /* ---- tables ---- */
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      td, th { text-align: left; padding: 9px 8px; border-bottom: 1px solid var(--line); }
      tr:last-child td { border-bottom: 0; }
      th { color: var(--muted); font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: .03em; }
      td.num, th.num { text-align: right; }

      textarea { min-height: 96px; resize: vertical; font-family: ui-monospace, "SF Mono", monospace; font-size: 13px; }
      .disclaimer { color: var(--muted); font-size: 11.5px; margin-top: 8px; text-align: center; }
      code { background: var(--panel2); border: 1px solid var(--line); border-radius: 5px; padding: 1px 5px; font-size: 12.5px; }
      a { color: var(--accent); }

      /* ---- bento grid + stat tiles + viz ---- */
      .grid { display: grid; gap: 16px; margin-bottom: 16px; }
      .grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
      .grid-3 { grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); }
      .grid .panel { margin: 0; }
      .stat { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); transition: transform .15s, box-shadow .15s; }
      .stat:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
      .stat .l { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 7px; }
      .stat .v { font-size: 28px; font-weight: 800; letter-spacing: -.025em; margin-top: 6px; }
      .chip { width: 36px; height: 36px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 12.5px; letter-spacing: .02em; flex: none; box-shadow: inset 0 1px 0 rgba(255,255,255,.25), 0 1px 2px rgba(0,0,0,.15); }
      .hbar { display: grid; grid-template-columns: 96px 1fr auto; align-items: center; gap: 12px; padding: 7px 0; font-size: 13.5px; }
      .hbar .track { background: var(--panel2); border-radius: 6px; height: 10px; overflow: hidden; }
      .hbar .track > span { display: block; height: 100%; background: var(--accent); border-radius: 6px; }
      .card { transition: transform .15s, box-shadow .15s; }
      .card:hover { transform: translateY(-1px); box-shadow: var(--shadow); }

      /* ---- drag & drop card picker ---- */
      .dz-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      @media (max-width: 640px) { .dz-wrap { grid-template-columns: 1fr; } }
      .dz { background: var(--panel2); border: 1.5px dashed var(--line); border-radius: 14px; padding: 14px; min-height: 130px; transition: border-color .15s, background .15s; }
      .dz.over { border-color: var(--accent); background: var(--accent-weak); }
      .dz h3 { font-size: 12px; color: var(--muted); margin: 0 0 12px; text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
      .card-tile { display: flex; align-items: center; gap: 11px; background: var(--panel); border: 1px solid var(--line); border-radius: 11px; padding: 10px 12px; margin-bottom: 8px; cursor: grab; box-shadow: var(--shadow); transition: transform .1s, box-shadow .15s; user-select: none; }
      .card-tile:hover { box-shadow: var(--shadow-lg); border-color: var(--accent); }
      .card-tile:active { cursor: grabbing; }
      .card-tile.dragging { opacity: .45; }
      .card-tile .t-name { font-weight: 600; font-size: 14.5px; }
      .card-tile .t-meta { color: var(--muted); font-size: 12px; }
      .card-tile .t-move { margin-left: auto; color: var(--muted); font-size: 17px; font-weight: 600; }

      /* ---- hero (Home) ---- */
      .hero { background: linear-gradient(135deg, #4f46e5 0%, #7c6ff2 100%); color: #fff; border-radius: var(--radius); padding: 32px 28px; margin-bottom: 16px; box-shadow: var(--shadow-lg); }
      .hero h1 { font-size: 30px; font-weight: 800; margin: 0 0 8px; letter-spacing: -.025em; line-height: 1.1; }
      .hero p { margin: 0 0 18px; opacity: .92; font-size: 15.5px; max-width: 620px; }
      .hero .alert { background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.28); border-radius: 10px; padding: 10px 14px; margin-bottom: 18px; font-size: 14px; }
      .hero .cta { display: flex; gap: 10px; flex-wrap: wrap; }
      .hero button { border: 0; border-radius: 10px; padding: 11px 18px; font-weight: 600; font-size: 14.5px; cursor: pointer; transition: filter .15s, transform .05s; }
      .hero button:active { transform: translateY(1px); }
      .hero .primary { background: #fff; color: var(--accent); }
      .hero .primary:hover { filter: brightness(.96); }
      .hero .ghost { background: rgba(255,255,255,.16); color: #fff; }
      .hero .ghost:hover { background: rgba(255,255,255,.26); }
      @media (max-width: 560px) { .hero h1 { font-size: 24px; } }

      @media (max-width: 620px) { header .sub { display: none; } }
    </style>
  </head>
  <body>
    <div class="topbar">
      <header>
        <h1>💳 Card<span class="brand-iq">IQ</span></h1>
        <span class="sub">optimise earning &amp; burning of points · cards, loyalty &amp; websites · India</span>
        <span class="spacer"></span>
        <span id="profilebar" style="display:flex; gap:6px; align-items:center"></span>
        <label style="margin:0; display:flex; align-items:center; gap:6px; font-size:12px">
          point value
          <select id="mode" style="width:auto" title="How to value your reward points">
            <option value="best">Optimistic</option>
            <option value="typical" selected>Realistic</option>
            <option value="floor">Conservative</option>
          </select>
        </label>
        <button id="theme-toggle" class="iconbtn" title="Toggle light / dark">🌙</button>
        <button id="nav-cards" class="iconbtn" title="Manage your cards">⚙</button>
      </header>
      <nav class="nav">
        <div class="tabs">
          <div class="tab active" data-tab="home">Home</div>
          <div class="tab" data-tab="recommend">Use a card</div>
          <div class="tab" data-tab="wallet">Points</div>
          <div class="tab" data-tab="coach">Review</div>
          <div class="tab" data-tab="getcard">＋ Get a card</div>
        </div>
      </nav>
    </div>
    <div class="wrap">
      <div class="subnav" id="subnav"></div>
      <div id="home"></div>
      <div id="recommend" hidden></div>
      <div id="plan" hidden></div>
      <div id="wallet" hidden></div>
      <div id="redeem" hidden></div>
      <div id="coach" hidden></div>
      <div id="getcard" hidden></div>
      <div id="cards" hidden></div>
      <p class="disclaimer">Card terms change often — confirm current details with your issuer before deciding.</p>
    </div>
    <script type="module" src="/web/app.js"></script>
  </body>
</html>
